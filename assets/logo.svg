<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">2K IQ Lab Logo</title>
  <desc id="desc">Rounded square logo with 2K IQ lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="92" height="92" rx="20" fill="none" stroke="#60a5fa" stroke-opacity="0.45"/>
  <text x="64" y="60" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial" font-size="35" font-weight="800" text-anchor="middle" fill="#f8fafc">2K</text>
  <text x="64" y="88" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial" font-size="17" font-weight="700" text-anchor="middle" fill="#93c5fd">IQ LAB</text>
</svg>
